version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "cargo"
    directory: "/stack-package-report"
    schedule:
      interval: "monthly"
    groups:
      cargo:
        update-types:
          - "minor"
          - "patch"
